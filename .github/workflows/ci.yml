name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout termin-scene
        uses: actions/checkout@v4

      - name: Checkout termin-base
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-base
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-base

      - name: Checkout termin-inspect
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-inspect
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-inspect

      - name: Configure, build and install termin-base
        run: |
          cmake -S deps/termin-base -B deps/termin-base/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_BASE_BUILD_TESTS=ON \
            -DTCBASE_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin
          cmake --build deps/termin-base/build --parallel
          sudo cmake --install deps/termin-base/build
          ctest --test-dir deps/termin-base/build --output-on-failure

      - name: Configure, build and install termin-inspect
        run: |
          cmake -S deps/termin-inspect -B deps/termin-inspect/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTI_BUILD_TESTS=ON \
            -DTI_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin \
            -DCMAKE_PREFIX_PATH=/opt/termin
          cmake --build deps/termin-inspect/build --parallel
          ctest --test-dir deps/termin-inspect/build --output-on-failure
          sudo cmake --install deps/termin-inspect/build

      - name: Configure, build and test termin-scene
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_SCENE_BUILD_TESTS=ON \
            -DTERMIN_SCENE_ENABLE_PYTHON=OFF \
            -DCMAKE_PREFIX_PATH=/opt/termin
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure
