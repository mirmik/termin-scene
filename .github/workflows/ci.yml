name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  LD_LIBRARY_PATH: /opt/termin/lib

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install --upgrade pip setuptools wheel

      - name: Download upstream SDKs
        env:
          GH_TOKEN: ${{ secrets.CLONETOKEN }}
        run: |
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-nanobind-sdk -p sdk-nanobind.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-nanobind.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-base -p sdk-base.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-base.tar.gz -C /
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-inspect -p sdk-inspect.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-inspect.tar.gz -C /

      - name: Build and install C library
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/termin \
            -DCMAKE_PREFIX_PATH=/opt/termin \
            -DTERMIN_SCENE_BUILD_TESTS=ON \
            -DTERMIN_BUILD_PYTHON=ON \
            -DPython_EXECUTABLE=$(which python3)
          cmake --build build --parallel
          sudo cmake --install build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Publish SDK artifact
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo DESTDIR=/tmp/staging cmake --install build
          tar czf /tmp/sdk-scene.tar.gz -C /tmp/staging opt/termin
          gh release create sdk-latest --title "SDK (latest)" --notes "Auto-built from $(git rev-parse --short HEAD)" --prerelease 2>/dev/null || true
          gh release upload sdk-latest /tmp/sdk-scene.tar.gz --clobber
