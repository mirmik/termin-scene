name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout termin-scene
        uses: actions/checkout@v4

      - name: Checkout termin-base
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-base
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-base

      - name: Checkout termin-graphics
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-graphics
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-graphics

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - name: Configure, build and install termin-base
        run: |
          cmake -S deps/termin-base -B deps/termin-base/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_BASE_BUILD_TESTS=ON \
            -DTCBASE_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/deps/install
          cmake --build deps/termin-base/build --parallel
          cmake --install deps/termin-base/build
          ctest --test-dir deps/termin-base/build --output-on-failure

      - name: Configure, build and test termin-graphics
        run: |
          cmake -S deps/termin-graphics -B deps/termin-graphics/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/deps/install \
            -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/deps/install
          cmake --build deps/termin-graphics/build --parallel
          ctest --test-dir deps/termin-graphics/build --output-on-failure
          cmake --install deps/termin-graphics/build

      - name: Configure, build and test termin-scene
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_SCENE_BUILD_TESTS=ON \
            -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/deps/install
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure
